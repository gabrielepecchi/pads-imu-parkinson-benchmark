# configs/pipeline.yaml
# PADS benchmark pipeline configuration.
# Run with: python run_pipeline.py --config configs/pipeline.yaml
# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
data_root: data/pads
results_dir: results
# ---------------------------------------------------------------------------
# Cross-validation
# ---------------------------------------------------------------------------
n_folds: 5
random_seed: 42
# ---------------------------------------------------------------------------
# Preprocessing
# ---------------------------------------------------------------------------
sampling_rate_hz: 100.0
highpass_cutoff_hz: 0.5
filter_order: 4
# ---------------------------------------------------------------------------
# Logistic Regression
# ---------------------------------------------------------------------------
lr_C: 1.0
lr_penalty: l2
lr_max_iter: 1000
# ---------------------------------------------------------------------------
# Random Forest
# ---------------------------------------------------------------------------
rf_n_estimators: 500
rf_max_features: sqrt
# ---------------------------------------------------------------------------
# CNN1D
# ---------------------------------------------------------------------------
cnn_epochs: 50
cnn_batch_size: 32
cnn_lr: 0.001
cnn_dropout: 0.5
cnn_device: cuda
# ---------------------------------------------------------------------------
# Model toggles
# ---------------------------------------------------------------------------
run_lr: true
run_rf: true
run_cnn: true
